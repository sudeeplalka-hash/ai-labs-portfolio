name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.7.0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        # Not --frozen-lockfile: this repo adds workspace packages between commits
        # (e.g. @labs/engines), so allow pnpm to reconcile the lockfile in CI.
        run: pnpm install --no-frozen-lockfile

      - name: Typecheck
        run: pnpm turbo run typecheck

      - name: Lint
        run: pnpm turbo run lint --filter=@labs/web

      - name: Unit tests
        run: pnpm turbo run test

      - name: Build
        run: pnpm turbo run build
